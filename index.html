<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outside</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background-image: url("background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    .bottom-right-button {
      position: fixed;
      bottom: 35px;
      left: 40px;
      width: 150px;
      height: auto;
      cursor: pointer;
      z-index: 20;
    }

    .invisible-zone {
      position: fixed;
      top: 40vh;
      right: 64vw;
      width: 7vw;
      height: 9vh;
      cursor: pointer;
      background: transparent;
      border: none;
      z-index: 30;
    }
    
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9999;
      cursor: pointer;
    }

    #loadingScreen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <div id="loadingScreen" onclick="closeLoadingScreen()">
    <img src="loading.jpg" alt="Loading Screen">
  </div>

  <audio id="peacefulAudio" src="peaceful.mp3" loop></audio>
  <audio id="blublubAudio" src="blublub.mp3"></audio>
  <img id="youtubeButton" src="youtube.jpg" alt="YouTube Button" class="bottom-right-button">

  <script>
    const peacefulAudio = document.getElementById("peacefulAudio");
    const cakeButton = document.getElementById("cakeButton");

    let cakeShown = false;

    function startmoosicAudio() {
      moosicAudio.volume = 0.35;
      moosicAudio.play().catch(() => {});
    }

    function closeLoadingScreen() {
      document.getElementById("loadingScreen").style.display = "none";
      startmoosicAudio();
    }

    window.addEventListener("load", startmoosicAudio);

    ["click", "keydown"].forEach(eventName => {
      document.addEventListener(eventName, startmoosicAudio, { once: true });
    });

    gladosButton.addEventListener("click", () => {
      gladosAudio.currentTime = 0;
      gladosAudio.play();
    });

    cakeButton.addEventListener("click", () => {
      cakeShown = !cakeShown;
      cakeButton.src = cakeShown ? "cake.jpg" : "click.JPG";
    });

    exitButton.addEventListener("click", () => {
      window.location.href = "https://ohlooklizard.github.io/outside/";
    });
  </script>
</body>
</html>
