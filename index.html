<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outside</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background-image: url("background.png");
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: black; 
    }

    .play-button {
      position: fixed;
      bottom: 35px;
      right: 40px;
      width: 90px;
      height: auto;
      cursor: pointer;
      z-index: 20;

        opacity: 1;
  transition: opacity 5s ease;
}

    .invisible-zone {
      position: fixed;
      top: 35px;
      left: 40px;
      width: 200px;
      height: 200px;
      cursor: pointer;
      background: transparent;
      border: none;
      z-index: 30;
    }
    
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9999;
      cursor: pointer;
    }

    #loadingScreen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-popup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

.video-box {
  position: relative;
  width: 80vw;
  max-width: 900px;
  aspect-ratio: 16 / 9;
}

.video-box iframe {
  width: 100%;
  height: 100%;
}

.close-button {
  position: absolute;
  top: -40px;
  right: 0;
  font-size: 24px;
  cursor: pointer;
}
    
    .bottom-message {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(126, 181, 225, 0.92);
  color: white;
  padding: 16px 30px;
  border-radius: 14px;
  font-size: 22px;
  text-align: center;
  font-family: Arial, sans-serif;
  box-shadow: 0 4px 15px rgba(0,0,0,0.35);
  z-index: 5000;
  max-width: 850px;
  width: 80%;

  opacity: 0;
  transition: opacity 2.5s ease;
  pointer-events: none;
}

.bottom-message.visible {
  opacity: 1;
}
    
  </style>
</head>

<body>
  <div id="loadingScreen" onclick="closeLoadingScreen()">
    <img src="loading.jpg" alt="Loading Screen">
  </div>

  <audio id="peacefulAudio" src="peaceful.mp3" loop></audio>
  <audio id="blublubAudio" src="blublub.mp3"></audio>
  
  <img id="playButton" src="play.PNG" alt="Play Button" class="play-button">

     <button
    id="invisibleZone"
    class="invisible-zone"
    aria-label="blub blub zone"
  ></button>

  <div id="videoPopup" class="video-popup">
  <div class="video-box">
    <button id="closeVideo" class="close-button">X</button>

    <iframe
      id="youtubeVideo"
      width="560"
      height="315"
      src=""
      title="YouTube video player"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>
</div>

  <div id="friendshipMessage" class="bottom-message">
  The friendship never ends... it's just the start of the next chapter.
</div>
  
  <script>

    const peacefulAudio = document.getElementById("peacefulAudio");
const playButton = document.getElementById("playButton");
const invisibleZone = document.getElementById("invisibleZone");
const videoPopup = document.getElementById("videoPopup");
const youtubeVideo = document.getElementById("youtubeVideo");
const closeVideo = document.getElementById("closeVideo");
const blubblubAudio = document.getElementById("blubblubAudio");
    
function startpeacefulAudio() {
  peacefulAudio.volume = 0.35;
  peacefulAudio.play().catch(() => {});
}

function closeLoadingScreen() {
  document.getElementById("loadingScreen").style.display = "none";
  startpeacefulAudio();
}

window.addEventListener("load", startpeacefulAudio);

["click", "keydown"].forEach(eventName => {
  document.addEventListener(eventName, startpeacefulAudio, { once: true });
});

    const friendshipMessage = document.getElementById("friendshipMessage");

setTimeout(() => {
  friendshipMessage.classList.add("visible");
}, 8000);
    
playButton.addEventListener("click", () => {
  videoPopup.style.display = "flex";
  youtubeVideo.src = "https://www.youtube.com/embed/kKX82mHkXoc?autoplay=1";
});

    invisibleZone.addEventListener("click", () => {
  blubblubAudio.currentTime = 0;
  blubblubAudio.play();
});
    
closeVideo.addEventListener("click", () => {
  videoPopup.style.display = "none";
  youtubeVideo.src = "";
});
    
  </script>
</body>
</html>
